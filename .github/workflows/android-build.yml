name: Build Android APK

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "Builds/**"
      - "Source/**"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: "APK build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  APK_OUTPUT_NAME: BackroomsLevelZero.apk
  SOURCE_ZIP_NAME: BackroomsLevelZeroProject.zip

jobs:
  build-apk:
    name: Build complete Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"
          yes | sdkmanager --licenses >/dev/null

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Validate project structure
        run: |
          test -f settings.gradle
          test -f build.gradle
          test -f app/build.gradle
          test -f app/src/main/AndroidManifest.xml
          test -f app/src/main/java/com/backrooms/levelzero/MainActivity.java

      - name: Select build task
        id: build_type
        shell: bash
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="debug"
          fi

          if [ "$BUILD_TYPE" = "release" ]; then
            echo "gradle_task=:app:assembleRelease" >> "$GITHUB_OUTPUT"
            echo "apk_glob=app/build/outputs/apk/release/*.apk" >> "$GITHUB_OUTPUT"
          else
            echo "gradle_task=:app:assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk_glob=app/build/outputs/apk/debug/*.apk" >> "$GITHUB_OUTPUT"
          fi

          echo "Selected build type: $BUILD_TYPE"

      - name: Build APK
        run: |
          gradle "${{ steps.build_type.outputs.gradle_task }}" --stacktrace --no-daemon

      - name: Create requested output files
        shell: bash
        run: |
          mkdir -p Builds Source

          APK_PATH="$(ls ${{ steps.build_type.outputs.apk_glob }} | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found at ${{ steps.build_type.outputs.apk_glob }}"
            exit 1
          fi

          cp "$APK_PATH" "Builds/${APK_OUTPUT_NAME}"
          test -s "Builds/${APK_OUTPUT_NAME}"

          rm -f "Source/${SOURCE_ZIP_NAME}"
          zip -r "Source/${SOURCE_ZIP_NAME}" \
            app build.gradle settings.gradle README.md BUILD_ANDROID.md CONTROLS.md .gitignore .github \
            -x "app/build/*" ".gradle/*" ".git/*" "Builds/*" "Source/*"

          test -s "Source/${SOURCE_ZIP_NAME}"

          echo "Generated APK:"
          ls -lh "Builds/${APK_OUTPUT_NAME}"
          echo "Generated source ZIP:"
          ls -lh "Source/${SOURCE_ZIP_NAME}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BackroomsLevelZero-APK
          path: Builds/BackroomsLevelZero.apk
          if-no-files-found: error

      - name: Upload source project artifact
        uses: actions/upload-artifact@v4
        with:
          name: BackroomsLevelZeroProject-Source
          path: Source/BackroomsLevelZeroProject.zip
          if-no-files-found: error

      - name: Commit generated APK and source ZIP
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f "Builds/${APK_OUTPUT_NAME}" "Source/${SOURCE_ZIP_NAME}"

          if git diff --cached --quiet; then
            echo "No generated APK/source changes to commit."
          else
            git commit -m "Build generated Android APK"
            git push
          fi

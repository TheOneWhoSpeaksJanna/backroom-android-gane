name: Apply Uploaded Textures

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/apply-uploaded-textures.yml"]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download textures and patch Godot
        shell: bash
        run: |
          set -eux
          mkdir -p godot/assets/textures /tmp/tex
          cd /tmp/tex
          curl -L --retry 5 -o Fabric028_1K-JPG.zip "https://ambientcg.com/get?file=Fabric028_1K-JPG.zip"
          curl -L --retry 5 -o OfficeCeiling001_1K-JPG.zip "https://ambientcg.com/get?file=OfficeCeiling001_1K-JPG.zip"
          curl -L --retry 5 -o Plastic005_1K-JPG.zip "https://ambientcg.com/get?file=Plastic005_1K-JPG.zip"
          unzip -q -o Fabric028_1K-JPG.zip Fabric028_1K-JPG_Color.jpg -d "$GITHUB_WORKSPACE/godot/assets/textures"
          unzip -q -o OfficeCeiling001_1K-JPG.zip OfficeCeiling001_1K-JPG_Color.jpg -d "$GITHUB_WORKSPACE/godot/assets/textures"
          unzip -q -o Plastic005_1K-JPG.zip Plastic005_1K-JPG_Color.jpg -d "$GITHUB_WORKSPACE/godot/assets/textures"
          cd "$GITHUB_WORKSPACE/godot/assets/textures"
          mv Fabric028_1K-JPG_Color.jpg carpet_dirty_color.jpg
          mv OfficeCeiling001_1K-JPG_Color.jpg ceiling_tiles_color.jpg
          mv Plastic005_1K-JPG_Color.jpg plastic_panel_color.jpg
          python3 - <<'PY'
          from pathlib import Path
          import zlib, struct, random
          def ch(t,d):
              return struct.pack("!I",len(d))+t+d+struct.pack("!I",zlib.crc32(t+d)&0xffffffff)
          w=h=128; raw=b""; random.seed(7)
          for y in range(h):
              row=bytearray([0])
              for x in range(w):
                  stripe=18 if (x//14)%2 else -3; n=random.randint(-7,7)
                  row += bytes([max(0,min(255,184+stripe+n)), max(0,min(255,158+stripe//2+n)), max(0,min(255,66+n//2))])
              raw += bytes(row)
          Path("wallpaper_yellow_color.png").write_bytes(b"\x89PNG\r\n\x1a\n"+ch(b"IHDR",struct.pack("!IIBBBBB",w,h,8,2,0,0,0))+ch(b"IDAT",zlib.compress(raw,9))+ch(b"IEND",b""))
          main=Path("../../Main.gd"); s=main.read_text()
          a=s.index("func mat("); b=s.index("func make_level():")
          block="func mat(c, rough := 0.8, texture_path := \"\"):\n\tvar m := StandardMaterial3D.new()\n\tm.albedo_color = c\n\tm.roughness = rough\n\tif texture_path != \"\" and ResourceLoader.exists(texture_path):\n\t\tm.albedo_texture = load(texture_path)\n\treturn m\n\nfunc make_materials():\n\twall_m = mat(Color(0.72, 0.63, 0.25), 0.95, \"res://assets/textures/wallpaper_yellow_color.png\")\n\tfloor_m = mat(Color(0.30, 0.24, 0.12), 0.98, \"res://assets/textures/carpet_dirty_color.jpg\")\n\tceil_m = mat(Color(0.62, 0.60, 0.46), 0.90, \"res://assets/textures/ceiling_tiles_color.jpg\")\n\tlight_m = mat(Color(1.0, 0.90, 0.55), 0.2, \"res://assets/textures/plastic_panel_color.jpg\")\n\tlight_m.emission_enabled = true\n\tlight_m.emission = Color(1.0, 0.88, 0.45)\n\tlight_m.emission_energy_multiplier = 1.25\n"
          main.write_text(s[:a]+block+s[b:])
          PY
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add godot/Main.gd godot/assets/textures
          git diff --cached --quiet || (git commit -m "Integrate Backrooms texture pack" && git push)

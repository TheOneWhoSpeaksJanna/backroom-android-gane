name: Build Godot 3D Android APK

on:
  push:
    branches: [ "main" ]
    paths: [ "godot/**", ".github/workflows/godot-android-build.yml", "README_GODOT_3D.md", "Documentation/TRUE_3D_GODOT_IMPLEMENTATION.md" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: godot-android-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.4.1"
  GODOT_STATUS: "stable"
  GODOT_BIN: "Godot_v4.4.1-stable_linux.x86_64"
  TEMPLATES_DIR: "$HOME/.local/share/godot/export_templates/4.4.1.stable"
  ANDROID_HOME: "/usr/local/lib/android/sdk"

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build true 3D Godot Android APK
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android and Godot
        shell: bash
        run: |
          set -eux
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          mkdir -p "$HOME/.android"
          keytool -genkeypair -v -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true
          REL="${GODOT_VERSION}-${GODOT_STATUS}"
          curl -LFO "https://github.com/godotengine/godot/releases/download/${REL}/Godot_v${REL}_linux.x86_64.zip" --retry 5 --connect-timeout 30
          curl -LFO "https://github.com/godotengine/godot/releases/download/${REL}/Godot_v${REL}_export_templates.tpz" --retry 5 --connect-timeout 30
          unzip -q "Godot_v${REL}_linux.x86_64.zip"
          chmod +x "${GODOT_BIN}"
          mkdir -p "${TEMPLATES_DIR}"
          unzip -q "Godot_v${REL}_export_templates.tpz" -d templates_tmp
          cp templates_tmp/templates/* "${TEMPLATES_DIR}/"
          mkdir -p "$HOME/.config/godot"
          printf '%s\n' '[gd_resource type="EditorSettings" format=3]' '' '[resource]' "export/android/android_sdk_path = \"${ANDROID_HOME}\"" "export/android/java_sdk_path = \"${JAVA_HOME}\"" "export/android/debug_keystore = \"${HOME}/.android/debug.keystore\"" 'export/android/debug_keystore_user = "androiddebugkey"' 'export/android/debug_keystore_pass = "android"' > "$HOME/.config/godot/editor_settings-4.tres"

      - name: Validate project
        run: |
          test -f godot/project.godot
          test -f godot/Main.tscn
          test -f godot/Main.gd
          ./"${GODOT_BIN}" --headless --path godot --quit

      - name: Export APK and source ZIP
        run: |
          set -eux
          mkdir -p Builds Source
          ./"${GODOT_BIN}" --headless --path godot --export-debug "Android Debug" "$GITHUB_WORKSPACE/Builds/BackroomsLevelZero3D.apk"
          test -s Builds/BackroomsLevelZero3D.apk
          zip -r Source/BackroomsLevelZeroGodotProject.zip godot README_GODOT_3D.md Documentation/TRUE_3D_GODOT_IMPLEMENTATION.md .github/workflows/godot-android-build.yml -x "godot/.godot/*"
          test -s Source/BackroomsLevelZeroGodotProject.zip

      - uses: actions/upload-artifact@v4
        with:
          name: BackroomsLevelZero3D-APK
          path: Builds/BackroomsLevelZero3D.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: BackroomsLevelZeroGodotProject-Source
          path: Source/BackroomsLevelZeroGodotProject.zip
          if-no-files-found: error

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Builds/BackroomsLevelZero3D.apk Source/BackroomsLevelZeroGodotProject.zip
          git diff --cached --quiet || (git commit -m "Build generated Godot 3D Android APK" && git push)

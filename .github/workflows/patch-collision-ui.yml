name: Patch Collision
on:
  push:
    branches: [main]
    paths: [".github/workflows/patch-collision-ui.yml"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          s=Path('godot/Main.gd').read_text()
          old='func box(parent,pos,size,material):\n\tvar m=MeshInstance3D.new(); var b=BoxMesh.new(); b.size=size; m.mesh=b; m.material_override=material; parent.add_child(m); m.position=pos; return m\n'
          new='func box(parent,pos,size,material,collidable:=true):\n\tvar m=MeshInstance3D.new(); var b=BoxMesh.new(); b.size=size; m.mesh=b; m.material_override=material; parent.add_child(m); m.position=pos\n\tif collidable and not (parent is CharacterBody3D) and not (parent is Camera3D):\n\t\tvar body:=StaticBody3D.new(); var shape:=CollisionShape3D.new(); var bs:=BoxShape3D.new()\n\t\tbs.size=size; shape.shape=bs; body.add_child(shape); parent.add_child(body); body.position=pos\n\treturn m\n'
          s=s.replace(old,new)
          Path('godot/Main.gd').write_text(s)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add godot/Main.gd
          git diff --cached --quiet || (git commit -m "Add collision bodies to Godot boxes" && git push)

name: Patch Gameplay Bug Fixes
on:
  push:
    branches: [main]
    paths: [".github/workflows/patch-gameplay-ui.yml"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch scripts
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path("godot/Main.gd")
          s=p.read_text()
          s=s.replace("enum State { TITLE, PLAY, PAUSE, WIN, CAUGHT }","enum State { LOADING, TITLE, PLAY, PAUSE, WIN, CAUGHT }")
          s=s.replace("var state:=State.TITLE","var state:=State.LOADING")
          if "var loading_t" not in s:
              s=s.replace("var msg_t:=4.0\n","var msg_t:=4.0\nvar loading_t:=1.25\n")
          s=s.replace("cs.shape=cap; player.add_child(cs)","cs.shape=cap; cs.position=Vector3(0,.85,0); player.add_child(cs)")
          s=s.replace("cs.shape=cap; monster.add_child(cs)","cs.shape=cap; cs.position=Vector3(0,1.05,0); monster.add_child(cs)")
          s=s.replace("stamina=max(0,stamina-delta*.24) if run else min(1,stamina+delta*.17)","if run:\n\t\tstamina=max(0,stamina-delta*.16)\n\telif wish.length()<.05:\n\t\tstamina=min(1,stamina+delta*.22)")
          s=s.replace("var sp=5.25 if run else 3.35","var sp=5.15 if run else 3.2")
          s=s.replace("if state==State.TITLE: start_game(); return","if state==State.TITLE: return")
          if "if state==State.LOADING:" not in s:
              s=s.replace("func _physics_process(delta):\n\tif state==State.PLAY:","func _physics_process(delta):\n\tif state==State.LOADING:\n\t\tloading_t-=delta\n\t\tif loading_t<=0:\n\t\t\tstate=State.TITLE; show(\"Use headphones if possible.\")\n\t\tupdate_hud(); return\n\tif state==State.PLAY:")
          if "global_position.y < -4.0" not in s:
              s=s.replace("move_player(mv,delta); move_monster(delta); check_objectives()","move_player(mv,delta); move_monster(delta); check_objectives()\n\t\tif player.global_position.y < -4.0:\n\t\t\tplayer.global_position=cell_to_world(Vector2i(1,1))+Vector3(0,.05,0); player.velocity=Vector3.ZERO; show(\"The carpet drops away. Level 0 puts you back.\")")
          s=s.replace('if state==State.TITLE: return "Backrooms Level Zero 3D"','if state==State.TITLE: return "Backrooms Level Zero"')
          s=s.replace('start_b=button(layer,"START LEVEL 0",Vector2(490,420),Vector2(300,70))','start_b=button(layer,"ENTER LEVEL 0",Vector2(490,420),Vector2(300,70))')
          s=s.replace('hud.add_theme_font_size_override("font_size",30)','hud.add_theme_font_size_override("font_size",28); hud.add_theme_color_override("font_color",Color(.95,.86,.45))')
          s=s.replace('msg_label.add_theme_font_size_override("font_size",24)','msg_label.add_theme_font_size_override("font_size",22); msg_label.add_theme_color_override("font_color",Color(.9,.82,.55))')
          p.write_text(s)
          pg=Path("godot/project.godot")
          t=pg.read_text()
          if "boot_splash/show_image" not in t:
              t=t.replace("[application]\n","[application]\nboot_splash/show_image=false\nboot_splash/bg_color=Color(0.018, 0.016, 0.007, 1)\n")
          pg.write_text(t)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add godot/Main.gd godot/project.godot
          git diff --cached --quiet || (git commit -m "Fix void fall sprint stamina splash and UI text" && git push)

name: Trigger Unity Cloud Build and Release APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "UnityProject/**"
      - ".github/workflows/unity-cloud-release.yml"

permissions:
  contents: write

env:
  UNITY_BUILD_API_BASE: https://build-api.cloud.unity3d.com/api/v1
  UNITY_PROJECT_NAME: "Desolation: The Backrooms"
  UNITY_BUILD_TARGET_NAME: "Default Android"
  RELEASE_APK_NAME: DesolationTheBackrooms-Unity.apk

jobs:
  unity-cloud-release:
    name: Trigger Unity Cloud and publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Unity Cloud build and download artifact
        env:
          UNITY_BUILD: ${{ secrets.UNITY_BUILD }}
        shell: bash
        run: |
          set -euo pipefail
          cat > unity_cloud_release.py <<'PY'
          import json, os, re, shutil, sys, time, urllib.error, urllib.request, zipfile
          from pathlib import Path

          api_key = os.environ.get("UNITY_BUILD", "").strip()
          if not api_key:
              raise SystemExit("Missing repository secret UNITY_BUILD.")

          build_base = os.environ["UNITY_BUILD_API_BASE"].rstrip("/")
          project_name = os.environ["UNITY_PROJECT_NAME"]
          target_name = os.environ["UNITY_BUILD_TARGET_NAME"]
          headers = {"Authorization": "Basic " + api_key, "Content-Type": "application/json"}

          def req(method, url, data=None, allow_empty=False):
              body = json.dumps(data).encode() if data is not None else None
              request = urllib.request.Request(url, data=body, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(request) as response:
                      raw = response.read().decode("utf-8", "ignore")
                      if not raw.strip():
                          return {} if allow_empty else {}
                      return json.loads(raw)
              except urllib.error.HTTPError as err:
                  msg = err.read().decode("utf-8", "ignore")
                  raise SystemExit(f"{method} {url} failed: HTTP {err.code} {msg}")

          def items(value):
              if isinstance(value, list):
                  return value
              if isinstance(value, dict):
                  for key in ("results", "projects", "buildtargets", "buildTargets", "builds", "items", "data"):
                      if isinstance(value.get(key), list):
                          return value[key]
              return []

          def pick(data, keys):
              if not isinstance(data, dict):
                  return ""
              for key in keys:
                  value = data.get(key)
                  if value is not None and value != "":
                      return str(value)
              return ""

          print("Discovering Unity project")
          projects = items(req("GET", build_base + "/projects"))
          project = next((p for p in projects if str(p.get("name", p.get("projectName", ""))) == project_name), None)
          if project is None:
              found = [str(p.get("name", p.get("projectName", ""))) for p in projects]
              raise SystemExit(f"Could not find Unity project {project_name!r}. Found: {found}")

          org_id = pick(project, ["orgid", "orgId", "org_id", "organizationId", "organizationid"])
          project_id = pick(project, ["projectid", "projectId", "project_id", "id", "guid"])
          if not org_id or not project_id:
              print(json.dumps(project, indent=2))
              raise SystemExit("Project found but org/project ID fields were not clear.")

          print("Project:", project_name)
          print("Org:", org_id)
          print("Project ID:", project_id)

          targets = items(req("GET", f"{build_base}/orgs/{org_id}/projects/{project_id}/buildtargets"))
          target = next((t for t in targets if str(t.get("name", t.get("buildTargetName", t.get("targetName", "")))) == target_name), None)
          if target is None:
              target = next((t for t in targets if "android" in json.dumps(t).lower()), None)
          if target is None:
              found = [str(t.get("name", t.get("buildTargetName", t.get("targetName", "")))) for t in targets]
              raise SystemExit(f"Could not find build target {target_name!r}. Found: {found}")

          target_id = pick(target, ["buildtargetid", "buildTargetId", "buildtargetId", "buildTargetID", "id", "name", "buildTargetName"])
          if not target_id:
              print(json.dumps(target, indent=2))
              raise SystemExit("Build target found but ID field was not clear.")

          print("Build target:", target_name)
          print("Build target ID:", target_id)

          print("Triggering Unity Cloud build")
          build = req("POST", f"{build_base}/orgs/{org_id}/projects/{project_id}/buildtargets/{target_id}/builds", {}, allow_empty=True)
          if not build:
              list_builds = items(req("GET", f"{build_base}/orgs/{org_id}/projects/{project_id}/buildtargets/{target_id}/builds"))
              build = list_builds[0] if list_builds else {}

          number = pick(build, ["number", "build", "buildNumber", "build_number", "buildnumber"])
          if not number:
              for _ in range(12):
                  time.sleep(10)
                  list_builds = items(req("GET", f"{build_base}/orgs/{org_id}/projects/{project_id}/buildtargets/{target_id}/builds"))
                  if list_builds:
                      build = list_builds[0]
                      number = pick(build, ["number", "build", "buildNumber", "build_number", "buildnumber"])
                      if number:
                          break
          if not number:
              print(json.dumps(build, indent=2))
              raise SystemExit("Build started but could not discover build number.")

          print("Build number:", number)
          status_url = f"{build_base}/orgs/{org_id}/projects/{project_id}/buildtargets/{target_id}/builds/{number}"
          final = None
          for attempt in range(90):
              detail = req("GET", status_url)
              status = str(pick(detail, ["buildStatus", "status", "state", "result", "lifecycle"])).lower()
              print(f"Attempt {attempt + 1}: status={status}")
              if any(x in status for x in ("success", "finished", "finishedsuccess", "succeeded")):
                  final = detail
                  break
              if any(x in status for x in ("fail", "error", "cancel", "cancelled")):
                  print(json.dumps(detail, indent=2))
                  raise SystemExit("Unity Cloud build failed.")
              time.sleep(20)

          if final is None:
              raise SystemExit("Unity Cloud build did not finish before the workflow timeout.")

          def walk(value):
              if isinstance(value, dict):
                  for key, child in value.items():
                      yield key, child
                      yield from walk(child)
              elif isinstance(value, list):
                  for child in value:
                      yield from walk(child)

          filenames = []
          for key, value in walk(final):
              if isinstance(value, str) and re.search(r"\.(apk|aab|zip)(\?|$|\s)", value):
                  filenames.append(value.split("/")[-1].split("?")[0])
              elif "filename" in key.lower() and isinstance(value, str):
                  filenames.append(value)

          candidates = []
          for name in filenames + ["build.apk", "Android.apk", "DefaultAndroid.apk", "Default%20Android.apk", "DesolationTheBackrooms.apk", "DesolationTheBackrooms-Unity.apk"]:
              if name and name not in candidates:
                  candidates.append(name)

          Path("dist").mkdir(exist_ok=True)
          output = Path("dist") / os.environ["RELEASE_APK_NAME"]
          for filename in candidates:
              download_endpoint = f"{build_base}/orgs/{org_id}/projects/{project_id}/buildtargets/{target_id}/builds/{number}/download/{filename}"
              try:
                  response = req("GET", download_endpoint)
                  download = pick(response, ["url", "downloadUrl", "href", "link", "location"])
                  if not download and isinstance(response, str):
                      download = response
                  if not download:
                      continue
                  print("Downloading artifact candidate", filename)
                  urllib.request.urlretrieve(download, output)
                  if output.exists() and output.stat().st_size > 1024 * 1024:
                      break
              except Exception as exc:
                  print(f"Candidate {filename} did not download: {exc}")

          if not output.exists() or output.stat().st_size <= 1024 * 1024:
              try:
                  share = req("POST", f"{build_base}/orgs/{org_id}/projects/{project_id}/buildtargets/{target_id}/builds/{number}/share", {}, allow_empty=True)
                  print(json.dumps(share, indent=2))
              except Exception as exc:
                  print("Could not create share link:", exc)
              print(json.dumps(final, indent=2))
              raise SystemExit("Could not download an APK artifact automatically. Check the log for Unity artifact names.")

          if output.suffix.lower() == ".zip":
              with zipfile.ZipFile(output) as z:
                  apks = [n for n in z.namelist() if n.lower().endswith(".apk")]
                  if apks:
                      z.extract(apks[0], "dist")
                      shutil.move(str(Path("dist") / apks[0]), output)

          with open("unity_build_meta.json", "w", encoding="utf-8") as handle:
              json.dump({"org": org_id, "project": project_id, "target": target_id, "build": number}, handle, indent=2)
          print(f"Downloaded {output} ({output.stat().st_size} bytes)")
          PY
          python3 unity_cloud_release.py

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -eux
          TAG="unity-cloud-${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" dist/DesolationTheBackrooms-Unity.apk unity_build_meta.json --title "Desolation: The Backrooms Unity Cloud Build ${GITHUB_RUN_NUMBER}" --notes "Unity Cloud Build APK automatically triggered from GitHub Actions." --latest

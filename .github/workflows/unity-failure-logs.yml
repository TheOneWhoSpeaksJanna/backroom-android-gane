name: Preserve Failed Unity Workflow Logs

on:
  workflow_run:
    workflows: ["Trigger Unity Cloud Build and Release APK"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  collect-unity-failure-logs:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download failed workflow logs
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        shell: bash
        run: |
          set -eux
          mkdir -p unity-failure-logs
          printf '%s
' "$RUN_URL" > unity-failure-logs/run_url.txt
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/logs" > unity-failure-logs/github-run-logs.zip
          unzip -q unity-failure-logs/github-run-logs.zip -d unity-failure-logs/extracted || true

      - name: Upload failed workflow logs
        uses: actions/upload-artifact@v4
        with:
          name: unity-cloud-failure-logs
          path: unity-failure-logs/**
          if-no-files-found: error

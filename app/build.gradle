plugins {
    id 'com.android.application'
}

android {
    namespace 'com.backrooms.levelzero'
    compileSdk 35

    defaultConfig {
        applicationId 'com.backrooms.levelzero'
        minSdk 26
        targetSdk 35
        versionCode 2
        versionName '1.1.0'
    }

    buildTypes {
        debug {
            applicationIdSuffix ''
            versionNameSuffix ''
        }
        release {
            minifyEnabled true
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
